name: donation-service CI/CD

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: solidarytech-donation
  GITOPS_REPO: Pereira277/solidarytech-infra

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

  security-and-lint:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: gosec
        uses: securego/gosec@master
        with:
          args: ./...

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: "1"

  docker-build-and-scan:
    runs-on: ubuntu-latest
    needs: security-and-lint
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE}" .
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build.outputs.image }}
          severity: CRITICAL
          exit-code: "1"

      - name: Push image to ECR
        run: docker push ${{ steps.build.outputs.image }}

  update-gitops:
    runs-on: ubuntu-latest
    needs: docker-build-and-scan
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}

      - name: Update deployment image tag
        run: |
          NEW_IMAGE="${{ needs.docker-build-and-scan.outputs.image }}"
          sed -i "s|image: .*solidarytech-donation.*|image: ${NEW_IMAGE}|" \
            gitops/donation-service/donation-deployment.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/donation-service/donation-deployment.yaml
          git commit -m "ci: update donation-service image to ${{ github.sha }}"
          git push
